<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saúde e Performance</title>
  <link rel="icon" type="image/png" href="/flag.png">
  <style>
    body {
      background-color: #ffffff;
      font-family: Georgia, 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 110px 20px;
      margin: 0;
      box-sizing: border-box;
    }

    .container {
      max-width: 580px;
      width: 100%;
    }

    .data {
      font-size: 0.8rem;
      color: #999;
      font-style: italic;
      margin-bottom: 4px;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      font-style: italic;
      font-weight: bold;
      color: #000;
      margin: 0 0 10px;
      line-height: 1.4;
      text-align: center;
    }

    .progresso {
      font-family: monospace;
      font-size: 0.95rem;
      color: #222;
      text-align: center;
      margin: 8px 0 18px;
    }

    p {
      font-size: 0.95rem;
      color: #222;
      line-height: 1.8;
      margin-bottom: 20px;
    }

    .post a:hover,
    .voltar:hover {
      color: #000;
    }

    .related {
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid #eee;
    }

    .related h2 {
      font-size: 1rem;
      font-style: italic;
      font-weight: bold;
      color: #000;
      margin: 0 0 16px;
      text-align: center;
    }

    .post {
      margin-bottom: 18px;
    }

    .post .date {
      font-size: 0.78rem;
      color: #999;
      font-style: italic;
      margin-bottom: 4px;
    }

    .post a {
      font-size: 1rem;
      color: #5a5acd;
      text-decoration: underline;
      font-style: italic;
      display: block;
      margin-bottom: 5px;
    }

    .post p {
      margin: 0;
      font-size: 0.88rem;
      color: #444;
      line-height: 1.6;
    }

    .voltar {
      display: block;
      margin-top: 40px;
      color: #5a5acd;
      font-style: italic;
      font-size: 0.9rem;
      text-decoration: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="data">Projeto</div>
    <h1>Saúde e Performance</h1>
    <div class="progresso">Nível 2 [███░░░░░░░] 28%</div>
    <p>Corrida, consistência, descanso e rotina mais estável.</p>

    <div class="related">
      <h2>Posts ligados</h2>
      <p style="text-align: center; font-size: 0.9rem; color: #666; font-style: italic; margin: 0;">
        Ainda não há posts ligados a este projeto.
      </p>
    </div>

    <a class="voltar" href="/projetos/index.html">← voltar</a>
  </div>
</body>
</html>
