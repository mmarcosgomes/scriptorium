<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Posts</title>
  <link rel="icon" type="image/png" href="/flag.png">
  <style>
    body {
      background-color: #ffffff;
      font-family: Georgia, 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 180px 20px;
      margin: 0;
      box-sizing: border-box;
    }

    .container {
      max-width: 580px;
      width: 100%;
    }

    h1 {
      font-size: 1.1rem;
      font-style: italic;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 16px;
      color: #000;
      text-align: center;
    }

    .filter-control {
      position: absolute;
      left: -9999px;
    }

    .filtros {
      text-align: center;
      font-size: 0.8rem;
      font-style: italic;
      margin-bottom: 28px;
      line-height: 1.8;
    }

    .filtros label {
      color: #5a5acd;
      text-decoration: underline;
      cursor: pointer;
    }

    .filtros label:hover {
      color: #000;
    }

    .filtros span {
      color: #999;
      margin: 0 4px;
    }

    .post {
      margin-bottom: 28px;
      border-bottom: 1px solid #eee;
      padding-bottom: 22px;
    }

    .post:last-child {
      border-bottom: none;
    }

    .data {
      font-size: 0.8rem;
      color: #999;
      font-style: italic;
      margin-bottom: 4px;
    }

    .post a {
      font-size: 1rem;
      color: #5a5acd;
      text-decoration: underline;
      font-style: italic;
      display: block;
      margin-bottom: 6px;
    }

    .post a:hover {
      color: #000;
    }

    .post p {
      font-size: 0.9rem;
      color: #444;
      line-height: 1.6;
      margin: 0;
    }

    .voltar {
      display: block;
      margin-top: 40px;
      color: #5a5acd;
      font-style: italic;
      font-size: 0.9rem;
      text-decoration: none;
      text-align: center;
    }

    .voltar:hover {
      color: #000;
    }

    #filter-all:checked ~ .filtros label[for="filter-all"],
    #filter-japones:checked ~ .filtros label[for="filter-japones"],
    #filter-fisica:checked ~ .filtros label[for="filter-fisica"],
    #filter-computacao:checked ~ .filtros label[for="filter-computacao"],
    #filter-saude-performance:checked ~ .filtros label[for="filter-saude-performance"],
    #filter-jesus:checked ~ .filtros label[for="filter-jesus"] {
      color: #000;
    }

    #filter-all:checked ~ .posts .post {
      display: block;
    }

    #filter-japones:checked ~ .posts .post,
    #filter-fisica:checked ~ .posts .post,
    #filter-computacao:checked ~ .posts .post,
    #filter-saude-performance:checked ~ .posts .post,
    #filter-jesus:checked ~ .posts .post {
      display: none;
    }

    #filter-japones:checked ~ .posts .post[data-tag="japones"],
    #filter-fisica:checked ~ .posts .post[data-tag="fisica"],
    #filter-computacao:checked ~ .posts .post[data-tag="computacao"],
    #filter-saude-performance:checked ~ .posts .post[data-tag="saude-performance"],
    #filter-jesus:checked ~ .posts .post[data-tag="jesus"] {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>POSTS</h1>

    <input class="filter-control" type="radio" name="tag-filter" id="filter-all" checked>
    <input class="filter-control" type="radio" name="tag-filter" id="filter-japones">
    <input class="filter-control" type="radio" name="tag-filter" id="filter-fisica">
    <input class="filter-control" type="radio" name="tag-filter" id="filter-computacao">
    <input class="filter-control" type="radio" name="tag-filter" id="filter-saude-performance">
    <input class="filter-control" type="radio" name="tag-filter" id="filter-jesus">

    <div class="filtros">
      <label for="filter-all">todos</label><span>//</span><label for="filter-japones">Japonês</label><span>//</span><label for="filter-fisica">Física</label><span>//</span><label for="filter-computacao">Computação</label><span>//</span><label for="filter-saude-performance">Saúde e Performance</label><span>//</span><label for="filter-jesus">Jesus</label>
    </div>

    <div class="posts">
      <div class="post" data-tag="computacao">
        <div class="data">04 Jun 2026</div>
        <a href="/blog/status/">Status temporis</a>
        <p>O tempo que me resta.</p>
      </div>

      <div class="post" data-tag="jesus">
        <div class="data">09 Mai 2026</div>
        <a href="/blog/ate-o-fim/">Até o fim</a>
        <p>Cristo nos leva até o fim para nos tornar humanos perfeitos.</p>
      </div>

      <div class="post" data-tag="jesus">
        <div class="data">08 Mai 2026</div>
        <a href="/blog/flores-de-Cristo/">Somos flores de Cristo</a>
        <p>Cristo nos ama incondicionalmente.</p>
      </div>
    </div>

    <a class="voltar" href="/index.html">← voltar</a>
  </div>
</body>
</html>
